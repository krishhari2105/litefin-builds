name: Litefin-dev Build & Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from Litefin repository'
        required: true
        default: 'development'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Generate dynamic Date and sanitized Branch Tag strings
      - name: Generate Dynamic Metadata Tags
        id: prep
        run: |
          RAW_BRANCH="${{ github.event.inputs.branch }}"
          SANITIZED_BRANCH=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "date_tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "branch_tag=${SANITIZED_BRANCH}" >> $GITHUB_OUTPUT

      # Step 2: Check out the external Litefin repository
      - name: Checkout Litefin repository
        uses: actions/checkout@v4
        with:
          repository: 'moazsalem/litefin'
          ref: ${{ github.event.inputs.branch }}

      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Step 4: Install dependencies and build
      - name: Install and Build Project
        run: |
          npm install
          npm run build

      # Step 5: Install Tizen CLI (Using Java 8 for Legacy Crypto Support)
      - name: Setup Tizen CLI
        run: |
          sudo apt-get update -qq
          mkdir -p $HOME/tizen-studio-cli
          cd $HOME/tizen-studio-cli
          wget -q https://download.tizen.org/sdk/Installer/tizen-sdk_10.0/web-cli_Tizen_SDK_10.0_ubuntu-64.bin
          chmod +x web-cli_Tizen_SDK_10.0_ubuntu-64.bin
          ./web-cli_Tizen_SDK_10.0_ubuntu-64.bin --accept-license $HOME/tizen-studio
          echo "$HOME/tizen-studio/tools/ide/bin" >> $GITHUB_PATH

      # Step 6: Decode Certificates & Build profiles.xml with .pwd files
      - name: Configure Samsung Certificates
        env:
          AUTHOR_B64: ${{ secrets.SAMSUNG_AUTHOR_BASE64 }}
          AUTHOR_PWD: "Krish2105" # You can change this back to secrets later
          DIST_B64: ${{ secrets.SAMSUNG_DISTRIBUTOR_BASE64 }}
          DIST_PWD: "Krish2105"
        run: |
          echo "=== Decoding certificate files ==="
          mkdir -p $HOME/tizen-certs
          echo "$AUTHOR_B64" | base64 --decode > $HOME/tizen-certs/author.p12
          echo "$DIST_B64"   | base64 --decode > $HOME/tizen-certs/distributor.p12

          echo "=== Creating .pwd files ==="
          # Tizen CLI expects a file containing the password, not the string itself
          echo -n "$AUTHOR_PWD" > $HOME/tizen-certs/author.pwd
          echo -n "$DIST_PWD" > $HOME/tizen-certs/distributor.pwd

          echo "=== Writing profiles.xml ==="
          mkdir -p $HOME/tizen-studio-data/profile

          # Matching your Windows XML exactly, including active="sam"
          printf '<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n' > $HOME/tizen-studio-data/profile/profiles.xml
          printf '<profiles active="sam" version="3.1">\n' >> $HOME/tizen-studio-data/profile/profiles.xml
          printf '  <profile name="sam">\n' >> $HOME/tizen-studio-data/profile/profiles.xml
          
          # Pointing the password attribute to the .pwd FILE PATHS
          printf '    <profileitem ca="" distributor="0" key="%s" password="%s" rootca=""/>\n' \
            "$HOME/tizen-certs/author.p12" "$HOME/tizen-certs/author.pwd" >> $HOME/tizen-studio-data/profile/profiles.xml
          printf '    <profileitem ca="" distributor="1" key="%s" password="%s" rootca=""/>\n' \
            "$HOME/tizen-certs/distributor.p12" "$HOME/tizen-certs/distributor.pwd" >> $HOME/tizen-studio-data/profile/profiles.xml
            
          printf '    <profileitem ca="" distributor="2" key="" password="" rootca=""/>\n' >> $HOME/tizen-studio-data/profile/profiles.xml
          printf '  </profile>\n' >> $HOME/tizen-studio-data/profile/profiles.xml
          printf '</profiles>\n' >> $HOME/tizen-studio-data/profile/profiles.xml

          echo "=== Pointing Tizen CLI at profiles.xml ==="
          tizen cli-config "default.profiles.path=$HOME/tizen-studio-data/profile/profiles.xml"

          echo "=== Setting active profile ==="
          tizen security-profiles set-active -n sam
          tizen security-profiles list

# Step 7: Package WGTs using npm, then re-sign with your TV certificate
      - name: Compile and Repackage WGT
        run: |
          echo "=== 1. Generating default packages via npm ==="
          npm run package

          echo "=== 2. Workspace state before re-signing ==="
          ls -lh *.wgt *.ipk 2>/dev/null || echo "(no wgt/ipk yet)"

          WGT_COUNT=$(ls *.wgt 2>/dev/null | wc -l)
          if [ "$WGT_COUNT" -eq 0 ]; then
            echo "ERROR: No .wgt files found after npm run package."
            exit 1
          fi

          echo "=== 3. Checking signatures BEFORE re-signing (baseline) ==="
          for wgt_file in *.wgt; do
            echo "--- $wgt_file ---"
            unzip -l "$wgt_file" | grep -E "signature|\.xml" || echo "(no signature files found)"
          done

          echo "=== 4. Re-signing each WGT with Samsung TV certificate ==="
          for wgt_file in *.wgt; do
            echo "----------------------------------------------------"
            echo "Re-signing: $wgt_file"

            tizen package \
              -t wgt \
              -s sam \
              -- "$wgt_file"

            SIGN_EXIT=$?
            if [ $SIGN_EXIT -ne 0 ]; then
              echo "ERROR: tizen package failed for $wgt_file (exit $SIGN_EXIT)"
              cat $HOME/tizen-studio-data/cli/logs/cli.log 2>/dev/null
              exit 1
            fi

            echo "Done: $wgt_file"
          done

          echo "=== 5. Verifying signatures AFTER re-signing ==="
          FAILED=0
          for wgt_file in *.wgt; do
            echo "----------------------------------------------------"
            echo "Verifying: $wgt_file"

            # Check the two required signature files exist inside the WGT zip
            if unzip -l "$wgt_file" | grep -q "author-signature.xml"; then
              echo "  [OK] author-signature.xml found"
            else
              echo "  [FAIL] author-signature.xml MISSING — author cert was NOT applied!"
              FAILED=1
            fi

            if unzip -l "$wgt_file" | grep -q "signature1.xml"; then
              echo "  [OK] signature1.xml found"
            else
              echo "  [FAIL] signature1.xml MISSING — distributor cert was NOT applied!"
              FAILED=1
            fi

            # Extract and show the CN (Common Name) from the embedded author cert
            # to confirm it's YOUR certificate and not the default one
            echo "  --- Author cert details ---"
            unzip -p "$wgt_file" author-signature.xml 2>/dev/null \
              | grep -o 'X509Certificate>[^<]*' \
              | head -1 \
              | sed 's/X509Certificate>//' \
              | base64 --decode 2>/dev/null \
              | openssl x509 -noout -subject -issuer -dates 2>/dev/null \
              || echo "  (could not decode cert — may be DER-embedded differently)"

            echo "  --- All files in $wgt_file ---"
            unzip -l "$wgt_file" | tail -n +4 | head -30
          done

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "=== SIGNING FAILED: One or more WGTs are missing signature files ==="
            echo "Dumping Tizen CLI log:"
            cat $HOME/tizen-studio-data/cli/logs/cli.log 2>/dev/null
            exit 1
          fi

          echo ""
          echo "=== 6. All WGTs verified and signed successfully ==="
          ls -lh *.wgt *.ipk 2>/dev/null

      # Step 8: Release to GitHub
      - name: Create or Update Litefin Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "build-${{ steps.prep.outputs.branch_tag }}-${{ steps.prep.outputs.date_tag }}"
          name: "Litefin Builds (${{ github.event.inputs.branch }}) - ${{ steps.prep.outputs.date_tag }}"
          body: "Manual build generated on ${{ steps.prep.outputs.date_tag }} from branch `${{ github.event.inputs.branch }}`. The Tizen .wgt package has been verified and signed with your personal television certificate profile."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.wgt
            *.ipk
