name: Litefin-dev Build & Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from Litefin repository'
        required: true
        default: 'development'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Generate dynamic Date and sanitized Branch Tag strings
      - name: Generate Dynamic Metadata Tags
        id: prep
        run: |
          RAW_BRANCH="${{ github.event.inputs.branch }}"
          SANITIZED_BRANCH=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "date_tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "branch_tag=${SANITIZED_BRANCH}" >> $GITHUB_OUTPUT

      # Step 2: Check out the external Litefin repository
      - name: Checkout Litefin repository
        uses: actions/checkout@v4
        with:
          repository: 'moazsalem/litefin'
          ref: ${{ github.event.inputs.branch }}

      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Step 4: Install dependencies and build
      - name: Install and Build Project
        run: |
          npm install
          npm run build

      # Step 5: Install Tizen CLI
      - name: Setup Tizen CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openjdk-11-jre wget
          mkdir -p $HOME/tizen-studio-cli
          cd $HOME/tizen-studio-cli
          wget -q https://download.tizen.org/sdk/Installer/tizen-sdk_10.0/web-cli_Tizen_SDK_10.0_ubuntu-64.bin
          chmod +x web-cli_Tizen_SDK_10.0_ubuntu-64.bin
          ./web-cli_Tizen_SDK_10.0_ubuntu-64.bin --accept-license $HOME/tizen-studio
          echo "$HOME/tizen-studio/tools/ide/bin" >> $GITHUB_PATH

      # Step 6: Decode Certificates & Build profiles.xml MANUALLY
      # This is the KEY fix - we bypass Gnome Keyring by writing plaintext
      # passwords directly into profiles.xml, which Tizen CLI reads fine headlessly.
      - name: Configure Samsung Certificates
        env:
          AUTHOR_B64: ${{ secrets.SAMSUNG_AUTHOR_BASE64 }}
          AUTHOR_PWD: ${{ secrets.SAMSUNG_AUTHOR_PASSWORD }}
          DIST_B64: ${{ secrets.SAMSUNG_DISTRIBUTOR_BASE64 }}
          DIST_PWD: ${{ secrets.SAMSUNG_DISTRIBUTOR_PASSWORD }}
        run: |
          echo "=== Decoding certificate files ==="
          mkdir -p $HOME/tizen-certs
          echo "$AUTHOR_B64" | base64 --decode > $HOME/tizen-certs/author.p12
          echo "$DIST_B64"   | base64 --decode > $HOME/tizen-certs/distributor.p12
          
          echo "=== Verifying decoded cert files ==="
          ls -lh $HOME/tizen-certs/
          # Verify the p12 files are valid (non-zero size)
          [ -s $HOME/tizen-certs/author.p12 ]      || { echo "ERROR: author.p12 is empty!"; exit 1; }
          [ -s $HOME/tizen-certs/distributor.p12 ] || { echo "ERROR: distributor.p12 is empty!"; exit 1; }

          echo "=== Creating profiles directory ==="
          mkdir -p $HOME/tizen-studio-data/profile

          echo "=== Writing profiles.xml manually with plaintext passwords ==="
          # CRITICAL: We write passwords in plaintext directly into profiles.xml.
          # This bypasses the Gnome Keyring which does NOT exist in GitHub Actions.
          cat > $HOME/tizen-studio-data/profile/profiles.xml << PROFILEEOF
          <?xml version="1.0" encoding="UTF-8" standalone="no"?>
          <profiles version="3.1">
            <profile name="sam">
              <profileitem ca="" distributor="0" key="$HOME/tizen-certs/author.p12" password="${AUTHOR_PWD}" rootca=""/>
              <profileitem ca="" distributor="1" key="$HOME/tizen-certs/distributor.p12" password="${DIST_PWD}" rootca=""/>
              <profileitem ca="" distributor="2" key="" password="" rootca=""/>
            </profile>
          </profiles>
          PROFILEEOF

          echo "=== Confirming profiles.xml written (passwords masked) ==="
          cat $HOME/tizen-studio-data/profile/profiles.xml | sed 's/password="[^"]*"/password="****"/g'

          echo "=== Pointing Tizen CLI to our profiles.xml ==="
          tizen cli-config "default.profiles.path=$HOME/tizen-studio-data/profile/profiles.xml"
          
          echo "=== Verifying active profile ==="
          tizen security-profiles set-active -n sam
          tizen security-profiles list

      # Step 7: Package WGTs using npm, then re-sign with your TV certificate
      - name: Compile and Repackage WGT
        run: |
          echo "=== 1. Generating default packages via npm ==="
          npm run package

          echo "=== 2. Workspace state before re-signing ==="
          ls -lh *.wgt *.ipk 2>/dev/null || echo "(no wgt/ipk yet — check npm package script output above)"

          # Abort early if nothing was generated
          WGT_COUNT=$(ls *.wgt 2>/dev/null | wc -l)
          if [ "$WGT_COUNT" -eq 0 ]; then
            echo "ERROR: No .wgt files found after npm run package. Check your build output."
            exit 1
          fi

          echo "=== 3. Re-signing each WGT with Samsung TV certificate ==="
          mkdir -p signed_wgts

          for wgt_file in *.wgt; do
            echo "----------------------------------------------------"
            echo "Re-signing: $wgt_file"
            
            # tizen package re-signs an existing .wgt when you pass it directly.
            # -t wgt  = widget type
            # -s sam  = our profile name from profiles.xml
            # -o <dir> = OUTPUT DIRECTORY (not a filename!)
            # -- <file> = the input wgt to re-sign
            tizen package \
              -t wgt \
              -s sam \
              -o signed_wgts \
              -- "$wgt_file"
            
            SIGN_EXIT=$?
            if [ $SIGN_EXIT -ne 0 ]; then
              echo "ERROR: tizen package failed for $wgt_file with exit code $SIGN_EXIT"
              echo "=== Dumping Tizen CLI log for diagnosis ==="
              cat $HOME/tizen-studio/tools/ide/cli.log 2>/dev/null || echo "(log not found)"
              exit 1
            fi
            
            echo "Successfully signed: $wgt_file"
          done

          echo "----------------------------------------------------"
          echo "=== 4. Contents of signed_wgts/ ==="
          ls -lh signed_wgts/ || echo "(signed_wgts is empty!)"

          echo "=== 5. Replacing originals with signed versions ==="
          if [ -n "$(ls signed_wgts/*.wgt 2>/dev/null)" ]; then
            cp -f signed_wgts/*.wgt ./
            echo "Replaced successfully."
          else
            echo "ERROR: No signed WGTs found. Dumping CLI log:"
            cat $HOME/tizen-studio/tools/ide/cli.log 2>/dev/null || echo "(log not found at default path)"
            find $HOME -name "cli.log" 2>/dev/null | head -5
            exit 1
          fi

          echo "=== 6. Final artifact list ==="
          ls -lh *.wgt *.ipk 2>/dev/null

      # Step 8: Release to GitHub
      - name: Create or Update Litefin Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "build-${{ steps.prep.outputs.branch_tag }}-${{ steps.prep.outputs.date_tag }}"
          name: "Litefin Builds (${{ github.event.inputs.branch }}) - ${{ steps.prep.outputs.date_tag }}"
          body: "Manual build generated on ${{ steps.prep.outputs.date_tag }} from branch `${{ github.event.inputs.branch }}`. The Tizen .wgt package has been verified and signed with your personal television certificate profile."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.wgt
            *.ipk
