name: Litefin-dev Build & Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from Litefin repository'
        required: true
        default: 'development'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required permission to create tags and releases

    steps:
      # Step 1: Generate dynamic Date and sanitized Branch Tag strings
      # Example: 'main' on 2026.05.22 becomes 'main-2026.05.22'
      - name: Generate Dynamic Metadata Tags
        id: prep
        run: |
          RAW_BRANCH="${{ github.event.inputs.branch }}"
          SANITIZED_BRANCH=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "date_tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "branch_tag=${SANITIZED_BRANCH}" >> $GITHUB_OUTPUT

      # Step 2: Check out the external Litefin repository using the input branch
      - name: Checkout Litefin repository
        uses: actions/checkout@v4
        with:
          repository: 'moazsalem/litefin'
          ref: ${{ github.event.inputs.branch }}

      # Step 3: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Step 4: Install Node dependencies and run Webpack build
      - name: Install and Build Project
        run: |
          npm install
          npm run build

      # Step 5: Install Tizen CLI CLI Tools
      - name: Setup Tizen CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre wget
          mkdir -p $HOME/tizen-studio-cli
          cd $HOME/tizen-studio-cli
          wget https://download.tizen.org/sdk/Installer/tizen-sdk_10.0/web-cli_Tizen_SDK_10.0_ubuntu-64.bin
          chmod +x web-cli_Tizen_SDK_10.0_ubuntu-64.bin
          ./web-cli_Tizen_SDK_10.0_ubuntu-64.bin --accept-license $HOME/tizen-studio
          echo "$HOME/tizen-studio/tools/ide/bin" >> $GITHUB_PATH

      # Step 6: Decode Certificates & Register Security Profile
      - name: Configure Samsung Certificates
        env:
          AUTHOR_B64: ${{ secrets.SAMSUNG_AUTHOR_BASE64 }}
          AUTHOR_PWD: ${{ secrets.SAMSUNG_AUTHOR_PASSWORD }}
          DIST_B64: ${{ secrets.SAMSUNG_DISTRIBUTOR_BASE64 }}
          DIST_PWD: ${{ secrets.SAMSUNG_DISTRIBUTOR_PASSWORD }}
        run: |
          mkdir -p $HOME/tizen-certs
          
          # Decode the p12 keys back to binary files safely
          echo "$AUTHOR_B64" | base64 --decode > $HOME/tizen-certs/author.p12
          echo "$DIST_B64" | base64 --decode > $HOME/tizen-certs/distributor.p12
          
          # Register security profile via Tizen CLI and make it active immediately (-A)
          tizen security-profiles add \
            -A \
            -n sam \
            -a $HOME/tizen-certs/author.p12 \
            -p "$AUTHOR_PWD" \
            -d $HOME/tizen-certs/distributor.p12 \
            -dp "$DIST_PWD"

          tizen security-profiles list  

# Step 7: Compile and explicitly move the verified signed WGT file
      - name: Compile and Repackage WGT
        run: |
          echo "=== 1. Generating all default repository packages ==="
          npm run package
          
          echo "=== 2. Listing workspace files before repackaging ==="
          ls -lh *.wgt *.ipk || true
          
          # Isolate the original generic .wgt package
          GENERIC_WGT=$(ls *.wgt | head -n 1)
          echo "Target generic package file found: $GENERIC_WGT"
          
          # Create a secure temporary home for output processing
          mkdir -p $GITHUB_WORKSPACE/signed-output
          
          echo "=== 3. Running explicit signature build execution ==="
          # Packaging into our targeted output folder forces the Tizen CLI to save the newly generated signed file there
          tizen package -t wgt -s sam -o "$GITHUB_WORKSPACE/signed-output" -- "$GENERIC_WGT"
          
          echo "=== 4. Checking the contents of the signed folder ==="
          ls -lh "$GITHUB_WORKSPACE/signed-output"
          
          # Move your freshly signed package back to the root, explicitly over-writing the original un-signed package
          SIGNED_WGT=$(ls $GITHUB_WORKSPACE/signed-output/*.wgt | head -n 1)
          cp -f "$SIGNED_WGT" "$GITHUB_WORKSPACE/$GENERIC_WGT"
          
          echo "=== 5. Final workspace confirmation ==="
          ls -lh *.wgt *.ipk

      # Step 8: Create or update a unique GitHub Release
      - name: Create or Update Litefin Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "build-${{ steps.prep.outputs.branch_tag }}-${{ steps.prep.outputs.date_tag }}"
          name: "Litefin Builds (${{ github.event.inputs.branch }}) - ${{ steps.prep.outputs.date_tag }}"
          body: "Manual build generated on ${{ steps.prep.outputs.date_tag }} from branch `${{ github.event.inputs.branch }}`. The Tizen .wgt package has been verified and signed with your personal television certificate profile."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.wgt
            *.ipk
