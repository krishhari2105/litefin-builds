name: Litefin-dev Build & Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from Litefin repository'
        required: true
        default: 'development'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Step 1: Generate dynamic Date and sanitized Branch Tag strings
      - name: Generate Dynamic Metadata Tags
        id: prep
        run: |
          RAW_BRANCH="${{ github.event.inputs.branch }}"
          SANITIZED_BRANCH=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "date_tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "branch_tag=${SANITIZED_BRANCH}" >> $GITHUB_OUTPUT

      - name: 'Checkout'
        uses: actions/checkout@v6

      # Step 2: Check out the external Litefin repository
      - name: Checkout Litefin repository
        uses: actions/checkout@v4
        with:
          repository: 'moazsalem/litefin'
          ref: ${{ github.event.inputs.branch }}


      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Step 4: Install dependencies and build
      - name: Install and Build Project
        run: |
          npm install
          npm run build

      # Step 5: Install Tizen Studio to GITHUB_WORKSPACE (Like Jellyfin workflow)
      - name: Setup Tizen CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y expect curl
          curl -fL -o tizen-installer "https://download.tizen.org/sdk/Installer/tizen-sdk_10.0/web-cli_Tizen_SDK_10.0_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm ./tizen-installer
          echo "${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin" >> $GITHUB_PATH

      # Step 6: Decode Certificates to GITHUB_WORKSPACE (Like Jellyfin workflow)
      - name: Decode Samsung Certificates
        env:
          AUTHOR_B64: ${{ secrets.SAMSUNG_AUTHOR_BASE64 }}
          DIST_B64: ${{ secrets.SAMSUNG_DISTRIBUTOR_BASE64 }}
        run: |
          echo "$AUTHOR_B64" | base64 -d > ${GITHUB_WORKSPACE}/author.p12
          echo "$DIST_B64"   | base64 -d > ${GITHUB_WORKSPACE}/distributor.p12

      - name: Copy Certificate Profile
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/tizen-studio-data/profile
          cp ${GITHUB_WORKSPACE}/profiles.xml ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml

      # Step 8: Package and Sign (Using exact Tizen binary path and -s flag)
      - name: Compile and Repackage WGT
        run: |
          echo "=== 1. Generating default packages via npm ==="
          npm run package

          echo "=== 2. Re-signing each WGT with Samsung TV certificate ==="
          for wgt_file in *.wgt; do
            echo "Re-signing: $wgt_file"
            
            # Using the exact command style from the Jellyfin workflow
            ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen package -t wgt -s "sam" -- "$wgt_file"
          done
          
          echo "=== 3. List Signed WGTs ==="
          ls -lh *.wgt

      # Step 9: Release to GitHub
      - name: Create or Update Litefin Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "build-${{ steps.prep.outputs.branch_tag }}-${{ steps.prep.outputs.date_tag }}"
          name: "Litefin Builds (${{ github.event.inputs.branch }}) - ${{ steps.prep.outputs.date_tag }}"
          body: "Manual build generated on ${{ steps.prep.outputs.date_tag }} from branch `${{ github.event.inputs.branch }}`. The Tizen .wgt package has been verified and signed with your personal television certificate profile."
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            *.wgt
            *.ipk
